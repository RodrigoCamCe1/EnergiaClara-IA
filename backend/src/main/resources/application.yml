spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/energiaclara
    username: ${DB_USERNAME:energiaclara}
    password: ${DB_PASSWORD:energiaclara}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  jwt:
    secret: ${JWT_SECRET:energiaclara-super-secret-key-32-chars-minimum!!}
    expiration-ms: 86400000

server:
  port: 8080
